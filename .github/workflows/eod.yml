name: A-share EOD
on:
  schedule:
    - cron: '20 10 * * 1-5'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install tushare yfinance pandas
      - run: python fetch_eod.py
      - name: commit data
        run: |
          git config user.name  "eod-bot"
          git config user.email "eod-bot@users.noreply.github.com"
          git add data/
          git commit -m "EOD ${{ github.run_id }}" || echo "no changes"
          git push
